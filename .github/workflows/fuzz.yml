# The deep build-fuzz hunt, on a schedule. CI runs a light sweep on every
# push; this job runs the real evolutionary search weekly across all four
# biomes so a curve-breaking build can't hide between manual hunts. A
# BREAKING finding fails the job (red run → investigate, ablation before
# blame); warnings print in the log with repro genomes, same as local.
name: Deep fuzz

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        biome: [verdant, frostfen, emberwaste, highlands]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fuzz:builds
        env:
          FUZZ_BIOME: ${{ matrix.biome }}
